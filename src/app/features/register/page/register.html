<main class="flex w-full h-full justify-center items-center">
  <p-card class="w-1/2 bg-gray-200">
    <form [formGroup]="form" class="p-8 w-full flex flex-col gap-8">
      <div class="flex flex-col items-center gap-2">
        <div class="text-2xl font-semibold leading-tight text-center w-full">
          Welcome
        </div>
        <div class="text-center w-full">
          <span class="leading-normal">Have an account?</span>
          <a class="text-primary font-medium ml-1 cursor-pointer hover:text-primary-emphasis" routerLink="/login">Login!</a>
        </div>
      </div>
      <div class="flex flex-col gap-6 w-full">
        <div class="flex flex-col gap-2 w-full">
          <label for="pseudo" class="font-medium leading-normal">Pseudo</label>
          <input pInputText formControlName="pseudo" id="pseudo" type="text" placeholder="Pseudo" class="w-full px-3 py-2 shadow-sm rounded-lg" />
        </div>

        <div class="flex flex-col gap-2 w-full">
          <label for="firstName" class="font-medium leading-normal">First Name</label>
          <input pInputText formControlName="firstName" id="firstName" type="text" placeholder="First Name" class="w-full px-3 py-2 shadow-sm rounded-lg" />
        </div>

        <div class="flex flex-col gap-2 w-full">
          <label for="lastName" class="font-medium leading-normal">Last Name</label>
          <input pInputText formControlName="lastName" id="lastName" type="text" placeholder="Last Name" class="w-full px-3 py-2 shadow-sm rounded-lg" />
        </div>

        <div class="flex flex-col gap-2 w-full">
          <label for="email" class="font-medium leading-normal">Email Address</label>
          <input pInputText formControlName="email" id="email" type="text" placeholder="Email address" class="w-full px-3 py-2 shadow-sm rounded-lg" />
        </div>

        <div class="flex flex-col gap-2 w-full">
          <label for="password" class="font-medium leading-normal">Password</label>
          <input pInputText formControlName="password" id="password" type="password" placeholder="Password" class="w-full px-3 py-2 shadow-sm rounded-lg" />
        </div>
      </div>
      <button pButton class="w-full py-2 rounded-lg flex justify-center items-center gap-2" (click)="register()">
        <i pButtonIcon class="{{USER_ICON}} text-base! leading-normal!"></i>
        <span pButtonLabel>Register</span>
      </button>
    </form>
  </p-card>
</main>
