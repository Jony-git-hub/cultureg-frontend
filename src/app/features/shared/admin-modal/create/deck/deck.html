<p-dialog header="Create Deck" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }" (onHide)="cancel()">
  <form [formGroup]="form" class="flex flex-col gap-4 mb-4">
    <label for="name" class="font-semibold w-24">Name*</label>
    <input formControlName="name" pInputText id="name" class="flex-auto" />

    <label for="theme" class="font-semibold w-24">Theme*</label>
    <p-select formControlName="themeId" [options]="themes" optionLabel="name" optionValue="id" appendTo="body" placeholder="Select a Theme" />

    <label for="language" class="font-semibold w-24">Language*</label>
    <p-select formControlName="languageId" [options]="languages" optionLabel="name" optionValue="id" appendTo="body" placeholder="Select a Language" />
  </form>
  <div class="flex justify-between gap-2">
    <p-button [icon]="CANCEL_ICON" label="Cancel" severity="secondary" (onClick)="cancel()" />
    <p-button [icon]="CONFIRM_ICON" iconPos="right" label="Create" (onClick)="confirm()" />
  </div>
</p-dialog>
