<div class="flex flex-col bg-white rounded-r-2xl p-5 h-full justify-between border-r">
  <div class="flex flex-col items-center gap-1 w-full">
    <p-button
      [routerLink]="home.route"
      pTooltip="{{ home.label }}"
      [icon]="home.icon"
      [text]="!isRouteActive(home.route)"
      [outlined]="!isRouteActive(home.route)"
    />
    <p-divider/>

    <div class="flex flex-col items-center gap-2 w-full">
      <p-button
        [routerLink]="play.route"
        pTooltip="{{ play.label }}"
        [icon]="play.icon"
        [text]="!isRouteActive(play.route)"
        [outlined]="!isRouteActive(play.route)"
      />

      <p-button
        [routerLink]="decksManager.route"
        pTooltip="{{ decksManager.label }}"
        [icon]="decksManager.icon"
        [text]="!isRouteActive(decksManager.route)"
        [outlined]="!isRouteActive(decksManager.route)"
      />
    </div>

      <!--<ng-container *ngFor="let item of chatBot">

        ></p-button>
      </ng-container>

      <p-divider></p-divider>

      <p-menu #batch [model]="batchItems" appendTo="body" [popup]="true"/>
      <p-button
        (click)="batch.toggle($event)"
        pTooltip="Batch"
        [text]="!isActive('batch')"
        [outlined]="!isActive('batch')"
      ></p-button>

      <p-menu #dashboard [model]="dashboardItems" appendTo="body" [popup]="true" />
      <p-button
        (click)="dashboard.toggle($event)"
        pTooltip="Dashboard"
        [text]="!isActive('dashboard')"
        [outlined]="!isActive('dashboard')"
      ></p-button>

      <p-menu #flow [model]="flowItems" appendTo="body" [popup]="true" />
      <p-button
        (click)="flow.toggle($event)"
        pTooltip="Flow"
        [text]="!isActive('flow')"
        [outlined]="!isActive('flow')"
      ></p-button>

      <p-menu #obeya [model]="obeyaItems" appendTo="body" [popup]="true" />

        [text]="!isActive('obeya')"
        [outlined]="!isActive('obeya')"
      ></p-button>

      <p-menu #simulation [model]="simulationItems" appendTo="body" [popup]="true" />
      <p-button
        (click)="simulation.toggle($event)"
        pTooltip="Simulation"
        [text]="!isActive('simulation')"
        [outlined]="!isActive('simulation')"
      ></p-button>

      <p-menu #worker [model]="workerItems" appendTo="body" [popup]="true" />
      <p-button
        (click)="worker.toggle($event)"
        pTooltip="Worker"
        [text]="!isActive('worker')"
        [outlined]="!isActive('worker')"
      ></p-button>

        (click)="workerCell.toggle($event)"
        pTooltip="Worker Cell"
        [text]="!isActive('worker-cell')"
        [outlined]="!isActive('worker-cell')"
      ></p-button>

      <p-divider></p-divider>

  </div>

  <div class="flex flex-col items-center gap-1">
    <p-menu #admin [model]="adminItems" appendTo="body" [popup]="true" />
    <p-button
      (click)="admin.toggle($event)"
      pTooltip="Admin"
      icon="pi pi-crown"
      [text]="!isAdminRouteActive()"
      [outlined]="!isAdminRouteActive()"
    />
