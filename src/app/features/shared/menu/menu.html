<div class="flex flex-col rounded-r-2xl p-5 h-full justify-between border-r">
  <div class="flex flex-col items-center gap-1 w-full">
      <div class="flex flex-col items-center gap-2 w-full">
      <p-button
        [routerLink]="home.route"
        pTooltip="{{ home.label }}"
        [icon]="home.icon"
        [text]="!isRouteActive(home.route)"
        [outlined]="!isRouteActive(home.route)"
      />

      <p-menu #admin [model]="adminItems" appendTo="body" [popup]="true" />
      <p-button
        (click)="admin.toggle($event)"
        pTooltip="Admin"
        [icon]="ADMIN_ICON"
        [text]="!isAdminRouteActive()"
        [outlined]="!isAdminRouteActive()"
      />
    </div>

    <p-divider/>

    <div class="flex flex-col items-center gap-2 w-full">
      <p-button
        [routerLink]="play.route"
        pTooltip="{{ play.label }}"
        [icon]="play.icon"
        [text]="!isRouteActive(play.route)"
        [outlined]="!isRouteActive(play.route)"
      />

      <p-button
        [routerLink]="decksManager.route"
        pTooltip="{{ decksManager.label }}"
        [icon]="decksManager.icon"
        [text]="!isRouteActive(decksManager.route)"
        [outlined]="!isRouteActive(decksManager.route)"
      />

      <p-button
        [routerLink]="marketPlace.route"
        pTooltip="{{ marketPlace.label }}"
        [icon]="marketPlace.icon"
        [text]="!isRouteActive(marketPlace.route)"
        [outlined]="!isRouteActive(marketPlace.route)"
      />
    </div>
  </div>

  <div class="flex flex-col items-center gap-1">
    <p-divider></p-divider>
    @if (isLoggedIn) {
      <p-button
        label="JK"
      ></p-button>
    } @else {
      <p-button
        [routerLink]="login.route"
        pTooltip="{{ login.label }}"
        [icon]="login.icon"
        [text]="!isRouteActive(login.route) && !isRouteActive(register.route)"
        [outlined]="!isRouteActive(login.route) && !isRouteActive(register.route)"
      ></p-button>
    }
  </div>
</div>
