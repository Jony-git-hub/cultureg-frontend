<p-card>
  <p-table
    [value]="themes"
    [loading]="loading"
    [paginator]="true"
    [rows]="5"
    [tableStyle]="{ 'min-width': '50rem' }"
    [rowsPerPageOptions]="[5, 10, 20]">
    <ng-template #header>
      <tr>
        <th pSortableColumn="name" style="width:90%">
          <div class="flex items-center gap-2">
            Name
            <p-sortIcon field="name" />
          </div>
        </th>
        <th style="width:10%">
        </th>
      </tr>
    </ng-template>
    <ng-template #body let-theme>
      <tr>
        <td>{{ theme.name }}</td>
        <td>
          <div class="flex justify-end gap-2">
            <p-button [icon]="UPDATE_ICON" outlined rounded (onClick)="updateTheme(theme)"></p-button>
            <p-button [icon]="DELETE_ICON" outlined rounded severity="danger" (onClick)="deleteTheme(theme)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="2">
          <div class="flex flex-col items-center justify-center p-6">
            <span class="text-xl">No theme found</span>
            <p class="text-sm mt-2 mb-2">Create a new theme to get started</p>
            <p-button [icon]="ADD_ICON" label="Add Theme" (onClick)="addTheme()"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<shared-admin-modal-create-theme (onConfirm)="confirmAddTheme($event)"></shared-admin-modal-create-theme>
<shared-admin-modal-update-theme (onConfirm)="confirmUpdateTheme($event)"></shared-admin-modal-update-theme>
<shared-admin-modal-delete-theme (onConfirm)="confirmDeleteTheme($event)"></shared-admin-modal-delete-theme>
