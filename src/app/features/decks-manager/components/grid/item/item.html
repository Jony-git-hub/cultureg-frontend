<p-card>
  <div class="flex flex-col w-full gap-4">
    <p class="text-center text-3xl font-bold">{{ deck.name }}</p>

    <div class="flex flex-row justify-between">
      <div class="flex flex-col w-1/2 gap-2">
        <div class="flex flex-col gap-1">
          <span class="font-semibold">Creator</span>
          <span class="meta-value">{{ deck.user.pseudo }}</span>
        </div>
        <div class="flex flex-col gap-1">
          <span class="font-semibold">Cards</span>
          <p-tag [value]="deck.cards.length.toString()"></p-tag>
        </div>
      </div>

      <p-divider layout="vertical"></p-divider>

      <div class="flex flex-col w-1/2 gap-2">
        <div class="flex flex-col gap-1">
          <span class="text-end font-semibold">Creation Date</span>
          <span class="text-end">{{ deck.timestamp }}</span>
        </div>
        <div class="flex flex-col gap-1">
          <span class="text-end font-semibold">Theme</span>
          <span class="text-end">{{ deck.theme.name }}</span>
        </div>
      </div>
    </div>
    <div class="flex flex-row gap-3">
      <p-button class="flex-1" styleClass="w-full">
        <div class="flex flex-col items-center justify-center h-full">
          <i [class]="PLAY_ICON"></i>
          <span>Play</span>
        </div>
      </p-button>

      <p-button class="flex-1" styleClass="w-full">
        <div class="flex flex-col items-center justify-center h-full">
          <i [class]="CARD_ICON"></i>
          <span>Cards</span>
        </div>
      </p-button>

      <p-button class="flex-1" styleClass="w-full">
        <div class="flex flex-col items-center justify-center h-full">
          <i [class]="UPDATE_ICON"></i>
          <span>Edit</span>
        </div>
      </p-button>

      <p-button class="flex-1" styleClass="w-full">
        <div class="flex flex-col items-center justify-center h-full">
          <i [class]="DELETE_ICON"></i>
          <span>Delete</span>
        </div>
      </p-button>
    </div>
  </div>
</p-card>
