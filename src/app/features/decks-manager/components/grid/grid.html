<div class="flex flex-col gap-8 hidden md:block">
  <div class="flex flex-col gap-2">
    <p class="text-lg">Created Decks</p>
    <div class="grid grid-cols-5 gap-4">
      @if (decks.length > 0) {
        @for (deck of decks; track deck.id) {
          <decks-manager-grid-item [deck]="deck"/>
        }
      }
    </div>
  </div>

  <div class="flex flex-col gap-2">
    <p class="text-lg">Liked Decks</p>
    <div class="grid grid-cols-5 gap-4">
      @if (decks.length > 0) {
        @for (deck of decks; track deck.id) {
          <decks-manager-grid-item [deck]="deck"/>
        }
      }
    </div>
  </div>

</div>


<div class="block md:hidden">

</div>
