<p-card>
  <p-table
    [value]="languages"
    [loading]="loading"
    [paginator]="true"
    [rows]="5"
    [tableStyle]="{ 'min-width': '50rem' }"
    [rowsPerPageOptions]="[5, 10, 20]">
    <ng-template #header>
      <tr>
        <th pSortableColumn="name" style="width:45%">
          <div class="flex items-center gap-2">
            Name
            <p-sortIcon field="name" />
          </div>
        </th>
        <th pSortableColumn="code" style="width:45%">
          <div class="flex items-center gap-2">
            Code
            <p-sortIcon field="code" />
          </div>
        </th>
        <th style="width:10%">
        </th>
      </tr>
    </ng-template>
    <ng-template #body let-language>
      <tr>
        <td>{{ language.name }}</td>
        <td>{{ language.code }}</td>
        <td>
          <div class="flex justify-end gap-2">
            <p-button [icon]="UPDATE_ICON" outlined rounded (onClick)="updateLanguage(language)"></p-button>
            <p-button [icon]="DELETE_ICON" outlined rounded severity="danger" (onClick)="deleteLanguage(language)"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="3">
          <div class="flex flex-col items-center justify-center p-6">
            <span class="text-xl">No language found</span>
            <p class="text-sm mt-2 mb-2">Create a new language to get started</p>
            <p-button [icon]="ADD_ICON" label="Add Language" (onClick)="addLanguage()"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<shared-admin-modal-create-language (onConfirm)="confirmAddLanguage($event)"></shared-admin-modal-create-language>
<shared-admin-modal-update-language (onConfirm)="confirmUpdateLanguage($event)"></shared-admin-modal-update-language>
<shared-admin-modal-delete-language (onConfirm)="confirmDeleteLanguage($event)"></shared-admin-modal-delete-language>
